<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_student.css') }}">
</head>

<body>

<header>
    <h1>Smart Attendance System</h1>
</header>

<div class="container">

    <aside>
        <h2>Admin Panel</h2>

        <ul>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/add_student">Add Student</a></li>
            <li><a href="/view_students">View Students</a></li>
            <li><a href="/attendance">Attendance</a></li>
            <li><a href="/reports">Reports</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>

    </aside>

    <main>

        <h2>Add Student</h2>

        <form method="POST" enctype="multipart/form-data">

            <div class="row">

                 <div class="input-box">
                  <label>Student Name</label>
                  <input type="text" name="student_name" placeholder="Enter Student Name"required>
                </div>

                <div class="input-box">
                  <label>Roll Number</label>
                  <input type="text" name="roll_number" placeholder="Enter Roll Number"required>
                </div>

            </div>

            <div class="row">

             <div class="input-box">
               <label>Class</label>
               <input type="text" name="class_name" placeholder="Enter Class"required>
            </div>

            <div class="input-box">
              <label>Section</label>
              <input type="text" name="section" placeholder="Enter Section"required>
            </div>

            </div>

            <div class="row">

            <div class="input-box">
              <label>Father's Name</label>
              <input type="text" name="father_name" placeholder="Enter Father's Name"required>
            </div>

            <div class="input-box">
              <label>Mobile Number</label>
              <input type="tel" name="mobile" placeholder="Enter Mobile Number"required>
            </div>

             </div>

            <div class="row">

            <div class="input-box">
              <label>Email</label>
              <input type="email" name="email" placeholder="Enter Email" required>
            </div>

            <div class="input-box">
              <label>Upload Photo</label>
              <input type="file" name="photo" required>
            </div>

            </div>

            <div class="input-box">

              <label>Address</label>

              <textarea name="address" placeholder="Enter Address"></textarea>

            </div>

              <button type="submit">Save Student</button>

        </form>

    </main>

</div>

</body>
</html>
