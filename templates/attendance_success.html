<!DOCTYPE html>
<html>
<head>
    <title>Attendance Success</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#eaf7ff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{

            width:500px;
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);

        }

        .tick{

            width:100px;
            height:100px;
            margin:auto;
            border-radius:50%;
            background:#28a745;
            color:white;
            font-size:60px;
            line-height:100px;

        }

        h1{

            margin-top:20px;
            color:#28a745;

        }

        p{

            margin-top:15px;
            font-size:20px;
            color:#555;

        }

        .btn{

            display:inline-block;
            margin-top:30px;
            padding:12px 25px;
            background:#00bcd4;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:18px;

        }

        .btn:hover{

            background:#0097a7;

        }

    </style>

</head>

<body>

<div class="box">

    <div class="tick">
        ✓
    </div>

    <h1>Attendance Marked Successfully✅</h1>

    <p>Thank You</p>

    <p>You may leave now.</p>

    <a href="/dashboard" class="btn">
        Back to Dashboard
    </a>

</div>

</body>
</html>
